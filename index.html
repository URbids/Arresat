<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Arresat — a map of how everything connects</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #070b15; }
  #root { max-width: 1100px; margin: 0 auto; padding: 18px 16px 40px; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  @keyframes flow { to { stroke-dashoffset: -24; } }
  @keyframes pulse { 0%,100% { opacity:0; transform:scale(1);} 50% { opacity:.5; transform:scale(1.9);} }
  @keyframes appear { from { opacity:0; } to { opacity:1; } }
  @keyframes rise { from { opacity:0; transform:translateY(10px);} to { opacity:1; transform:translateY(0);} }
  .pattern-edge { animation: flow 1.1s linear infinite; }
  .appear { animation: appear .5s ease both; }
  @media (prefers-reduced-motion: reduce){ .pattern-edge,.frontier,.appear,.wv-rise{ animation:none !important; } }
  .frontier { transform-box: fill-box; transform-origin:center; animation: pulse 2.2s ease-in-out infinite; }
  .node-hit { cursor:pointer; }
  .wv-title { font-family:'Space Grotesk', ui-sans-serif, sans-serif; }
  .wv-rise { animation: rise .6s cubic-bezier(.2,.7,.2,1) both; }
  .row { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
  .wv-input, .wv-select { background:#0d1426; border:1px solid #2a3445; border-radius:8px; color:#e8ecf5; font-size:12.5px; padding:5px 9px; outline:none; font-family:inherit; }
  .wv-input:focus, .wv-select:focus { border-color:#3f5878; }
  .wv-input::placeholder { color:#5b6479; }
  .btn { font-size:12.5px; border:1px solid #2a3445; border-radius:8px; padding:4px 10px; background:transparent; color:#aeb6c8; cursor:pointer; font-family:inherit; }
  .btn:hover { border-color:#3f5878; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const TOPICS = {
  quantum:   { label: "Physics",   color: "#7b74ff", rank: 1 },
  chemistry: { label: "Chemistry", color: "#2fbfa8", rank: 3 },
  cosmos:    { label: "Cosmos",    color: "#4f9be8", rank: 4 },
  earth:     { label: "Earth",     color: "#b8893f", rank: 4 },
  life:      { label: "Life",      color: "#5fc95a", rank: 5 },
  mind:      { label: "Mind",      color: "#a974f0", rank: 5.7 },
  society:   { label: "Society",   color: "#e85f9c", rank: 6.4 },
};
const PATTERNS = {
  feedback:  { color: "#f2a93b", dash: "7 6",      on: true,  label: "feedback",  note: "Sense, compare, correct — the loop that holds a thing steady." },
  cycle:     { color: "#ff6b9d", dash: "1 7",      on: true,  label: "cycle",     note: "What goes around: matter and energy returning to where they started." },
  flow:      { color: "#43d0e0", dash: "11 5 2 5", on: true,  label: "flow",      note: "A network moving energy, nutrients or information to where it's needed." },
  selection: { color: "#ff6a5a", dash: "9 5",      on: false, label: "selection", note: "Variants compete; the fitter ones persist. Evolution's logic, everywhere." },
  threshold: { color: "#dfe6ff", dash: "3 6",      on: false, label: "threshold", note: "Push a system past a tipping point and it flips to a new state." },
};
const APP_NAME = "Arresat";
const STORE_KEY = "arresat-graph-v1";
const TOKEN_KEY = "arresat-token";
const STRUCT = "#3f5878";
const HYPO = "#e9c2ff";
// Your Railway backend. AI calls, accounts, and cloud map-saving all route through it.
const API_BASE = "https://arresat-backend-production.up.railway.app";
const ANALYZE_ENDPOINT = API_BASE + "/ai";

const N = (id, label, topic, rank, r, note) => ({ id, label, topic, rank, r, note });
const BASE_NODES = [
  N("quantum_fields","Quantum fields","quantum",0,14,"The deepest layer of reality; everything else is a ripple in these fields."),
  N("spacetime","Spacetime","quantum",0.5,12,"The fabric of where and when, bent by mass and energy."),
  N("energy","Energy","quantum",0.6,13,"The capacity to cause change — never created or destroyed, only moved."),
  N("causality","Causality","quantum",0.8,11,"Cause and effect — the rule that lets one event determine the next."),
  N("forces","Forces","quantum",0.9,12,"The fundamental interactions that bind, push and pull everything."),
  N("entropy","Entropy","quantum",1.3,12,"The relentless drift toward disorder — and the arrow of time itself."),
  N("light","Light","cosmos",1.0,12,"Electromagnetic radiation: how energy and information cross space."),
  N("gravity","Gravity","cosmos",1.2,12,"The curvature of spacetime; architect of stars, planets and galaxies."),
  N("matter","Matter","chemistry",1.4,13,"Anything with mass — the stuff that objects are built from."),
  N("information","Information","mind",1.5,12,"Distinctions that can be stored, copied and acted upon — the seed of computation and mind."),
];
const S = (a, b) => ({ source: a, target: b, type: "structure" });
const P = (a, b, f) => ({ source: a, target: b, type: "pattern", pattern: f });
const BASE_LINKS = [
  S("quantum_fields","forces"),
  S("quantum_fields","matter"),
  S("energy","matter"),
  S("energy","light"),
  S("forces","gravity"),
  S("spacetime","gravity"),
  S("spacetime","causality"),
  P("energy","entropy","flow"),
  P("information","entropy","flow"),
  P("information","light","flow"),
  P("causality","entropy","threshold"),
];
const BASE = { nodes: BASE_NODES, links: BASE_LINKS };
const RMIN = Math.min(...BASE_NODES.map(n => n.rank));
const RMAX = Math.max(...BASE_NODES.map(n => n.rank));
const W = 1040, H = 720;
const yTarget = (rank) => H - 60 - ((rank - RMIN) / (RMAX - RMIN)) * (H - 130);

function computeCandidates(nodes, links, byId) {
  const key = (a, b) => [a, b].sort().join("|");
  const connected = new Set();
  const full = {}; nodes.forEach((n) => (full[n.id] = new Set()));
  const parts = {}; Object.keys(PATTERNS).forEach((f) => (parts[f] = new Set()));
  links.forEach((l) => {
    if (!full[l.source] || !full[l.target]) return;
    full[l.source].add(l.target); full[l.target].add(l.source);
    connected.add(key(l.source, l.target));
    if (l.type === "pattern") { parts[l.pattern].add(l.source); parts[l.pattern].add(l.target); }
  });
  const deg = (id) => full[id].size;
  const cand = {};
  const bump = (u, v, score, fam, reason) => {
    const k = key(u, v); const [a, b] = k.split("|");
    if (!cand[k]) cand[k] = { a, b, score: 0, fams: new Set(), reasons: new Set() };
    cand[k].score += score; if (fam) cand[k].fams.add(fam); cand[k].reasons.add(reason);
  };
  Object.keys(PATTERNS).forEach((f) => {
    const Pn = [...parts[f]];
    for (let i = 0; i < Pn.length; i++) for (let j = i + 1; j < Pn.length; j++) {
      const u = Pn[i], v = Pn[j];
      if (!byId[u] || !byId[v] || byId[u].topic === byId[v].topic) continue;
      if (connected.has(key(u, v))) continue;
      bump(u, v, 3 + Math.abs(byId[u].rank - byId[v].rank) * 0.5, f, "both run on " + f);
    }
  });
  const ids = nodes.map((n) => n.id);
  for (let i = 0; i < ids.length; i++) for (let j = i + 1; j < ids.length; j++) {
    const u = ids[i], v = ids[j];
    if (connected.has(key(u, v))) continue;
    const cn = [...full[u]].filter((w) => full[v].has(w));
    if (cn.length < 2) continue;
    const aa = cn.reduce((s, w) => s + 1 / Math.log(deg(w) + 1), 0);
    const cross = byId[u].topic !== byId[v].topic;
    bump(u, v, aa * (cross ? 2.2 : 0.6) + (cross ? 1.5 : 0), null, "share " + cn.length + " links (" + cn.map((w) => byId[w].label).join(", ") + ")");
  }
  return Object.values(cand).map((c) => ({ ...c, fams: [...c.fams], reasons: [...c.reasons] })).sort((a, b) => b.score - a.score).slice(0, 16);
}

function loadGraph() {
  try { const s = localStorage.getItem(STORE_KEY); if (s) { const g = JSON.parse(s); if (g && g.nodes && g.links) return g; } } catch (e) {}
  return null;
}
function saveGraph(g) { try { localStorage.setItem(STORE_KEY, JSON.stringify(g)); } catch (e) {} }
function getToken() { try { return localStorage.getItem(TOKEN_KEY) || null; } catch (e) { return null; } }
function setToken(t) { try { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); } catch (e) {} }
async function api(path, opts) {
  opts = opts || {};
  const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
  const tok = getToken();
  if (tok) headers["Authorization"] = "Bearer " + tok;
  const res = await fetch(API_BASE + path, { method: opts.method || "GET", headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error((data && data.error) || ("Request failed (" + res.status + ")"));
  return data;
}
const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "") || "node";

function Weave() {
  const SEED = "quantum_fields";
  const [graph, setGraph] = useState(() => loadGraph() || BASE);
  const nodes = graph.nodes, links = graph.links;
  const NODE_BY_ID = useMemo(() => Object.fromEntries(nodes.map((n) => [n.id, n])), [nodes]);
  const adjacency = useMemo(() => {
    const m = {}; nodes.forEach((n) => (m[n.id] = new Set()));
    links.forEach((l) => { if (m[l.source] && m[l.target]) { m[l.source].add(l.target); m[l.target].add(l.source); } });
    return m;
  }, [nodes, links]);
  const CANDIDATES = useMemo(() => computeCandidates(nodes, links, NODE_BY_ID), [nodes, links, NODE_BY_ID]);
  useEffect(() => { saveGraph(graph); }, [graph]);

  const [revealed, setRevealed] = useState(() => new Set([SEED]));
  const [selected, setSelected] = useState(SEED);
  const [, setTick] = useState(0);
  const [view, setView] = useState({ x: 0, y: 0, k: 1 });
  const [show, setShow] = useState({ structure: true, ...Object.fromEntries(Object.entries(PATTERNS).map(([k, p]) => [k, p.on])) });
  const [isoTopic, setIsoTopic] = useState(null);
  const [focus, setFocus] = useState(false);
  const [query, setQuery] = useState("");
  const [discover, setDiscover] = useState(false);
  const [hoverCand, setHoverCand] = useState(null);
  const [pinned, setPinned] = useState(() => new Set());
  const [intro, setIntro] = useState(true);
  const [featuredIdx, setFeaturedIdx] = useState(0);
  const [edit, setEdit] = useState(false);
  const [linkMode, setLinkMode] = useState(false);
  const [pendingLink, setPendingLink] = useState(null);
  const [linkFirst, setLinkFirst] = useState(null);
  const [newLabel, setNewLabel] = useState("");
  const [newTopic, setNewTopic] = useState("life");
  const [newRel, setNewRel] = useState("structure");
  const [analyzing, setAnalyzing] = useState(null);
  const [analysis, setAnalysis] = useState(null);
  const [analysisErr, setAnalysisErr] = useState(null);
  const [growing, setGrowing] = useState(false);
  const [growList, setGrowList] = useState(null);

  const [authUser, setAuthUser] = useState(null);
  const [authOpen, setAuthOpen] = useState(false);
  const [authMode, setAuthMode] = useState("login");
  const [authEmail, setAuthEmail] = useState("");
  const [authPass, setAuthPass] = useState("");
  const [authErr, setAuthErr] = useState(null);
  const [authBusy, setAuthBusy] = useState(false);
  const [syncState, setSyncState] = useState("idle");
  const saveTimer = useRef(null);
  const skipSync = useRef(false);

  // On load: if a token is stored, validate it and pull the saved map.
  useEffect(() => {
    if (!getToken()) return;
    (async () => {
      try {
        const me = await api("/me");
        setAuthUser({ email: me.email });
        const m = await api("/map");
        if (m && m.data && m.data.nodes && m.data.links) {
          skipSync.current = true;
          setGraph({ nodes: m.data.nodes, links: m.data.links });
          setRevealed(new Set(m.data.revealed && m.data.revealed.length ? m.data.revealed : [SEED]));
        }
      } catch (e) { setToken(null); setAuthUser(null); }
    })();
  }, []);

  // When signed in, debounce-save the map to the account on any change.
  useEffect(() => {
    if (!authUser) return;
    if (skipSync.current) { skipSync.current = false; return; }
    setSyncState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try { await api("/map", { method: "PUT", body: { data: { nodes: graph.nodes, links: graph.links, revealed: [...revealed] } } }); setSyncState("saved"); }
      catch (e) { setSyncState("error"); }
    }, 1200);
    return () => clearTimeout(saveTimer.current);
  }, [graph, revealed, authUser]);

  const doAuth = async () => {
    setAuthErr(null); setAuthBusy(true);
    try {
      const path = authMode === "signup" ? "/auth/signup" : "/auth/login";
      const r = await api(path, { method: "POST", body: { email: authEmail, password: authPass } });
      setToken(r.token); setAuthUser({ email: r.email }); setAuthOpen(false); setAuthPass("");
      try {
        const m = await api("/map");
        if (m && m.data && m.data.nodes && m.data.links) {
          skipSync.current = true;
          setGraph({ nodes: m.data.nodes, links: m.data.links });
          setRevealed(new Set(m.data.revealed && m.data.revealed.length ? m.data.revealed : [SEED]));
        } else {
          await api("/map", { method: "PUT", body: { data: { nodes: graph.nodes, links: graph.links, revealed: [...revealed] } } });
        }
      } catch (e) {}
    } catch (e) { setAuthErr(e.message || "Something went wrong."); }
    finally { setAuthBusy(false); }
  };
  const doLogout = async () => {
    try { await api("/auth/logout", { method: "POST" }); } catch (e) {}
    setToken(null); setAuthUser(null); setSyncState("idle");
  };

  const svgRef = useRef(null), simRef = useRef(null), nodesRef = useRef([]), linksRef = useRef([]), drag = useRef(null), pan = useRef(null);

  useEffect(() => {
    let pending = false;
    const sim = d3.forceSimulation([])
      .force("link", d3.forceLink([]).id((d) => d.id).distance((l) => (l.type === "pattern" ? 220 : 92)).strength((l) => (l.type === "pattern" ? 0.06 : 0.65)))
      .force("charge", d3.forceManyBody().strength(-300))
      .force("collide", d3.forceCollide().radius((d) => d.r + 22))
      .force("x", d3.forceX(W / 2).strength(0.045))
      .force("y", d3.forceY((d) => yTarget(d.rank)).strength(0.12))
      .on("tick", () => { if (pending) return; pending = true; requestAnimationFrame(() => { pending = false; setTick((t) => t + 1); }); });
    simRef.current = sim;
    return () => sim.stop();
  }, []);

  const revealedKey = [...revealed].sort().join(",");
  const graphKey = nodes.length + ":" + links.length;
  useEffect(() => {
    const sim = simRef.current; if (!sim) return;
    const byId = new Map(nodesRef.current.map((n) => [n.id, n]));
    const active = nodes.filter((n) => revealed.has(n.id)).map((n) => {
      const ex = byId.get(n.id); if (ex) { ex.r = n.r; ex.rank = n.rank; ex.topic = n.topic; ex.label = n.label; ex.note = n.note; return ex; }
      const anchorId = [...(adjacency[n.id] || [])].find((id) => byId.has(id));
      const a = anchorId ? byId.get(anchorId) : { x: W / 2, y: H / 2 };
      return { ...n, x: a.x + (Math.random() - 0.5) * 80, y: a.y + (Math.random() - 0.5) * 80 };
    });
    nodesRef.current = active;
    const present = new Set(active.map((n) => n.id));
    const activeLinks = links.filter((l) => present.has(l.source) && present.has(l.target)).map((l) => ({ ...l, _k: l.source + "|" + l.target + "|" + l.type + "|" + (l.pattern || "") }));
    linksRef.current = activeLinks;
    sim.nodes(active);
    sim.force("link").links(activeLinks);
    sim.alpha(0.9).restart();
  }, [revealedKey, graphKey]); // eslint-disable-line

  const revealFrom = useCallback((id) => { setRevealed((prev) => { const next = new Set(prev); (adjacency[id] || []).forEach((nb) => next.add(nb)); next.add(id); return next; }); }, [adjacency]);

  const toSim = useCallback((cx, cy) => {
    const svg = svgRef.current; const pt = svg.createSVGPoint(); pt.x = cx; pt.y = cy;
    const vb = pt.matrixTransform(svg.getScreenCTM().inverse());
    return { x: (vb.x - view.x) / view.k, y: (vb.y - view.y) / view.k };
  }, [view]);

  const onNodeDown = (e, id) => {
    e.stopPropagation();
    const p = toSim(e.clientX, e.clientY);
    const node = nodesRef.current.find((n) => n.id === id);
    drag.current = { id, moved: false, ox: p.x - node.x, oy: p.y - node.y };
    simRef.current.alphaTarget(0.25).restart();
  };

  const pickLink = (id) => {
    if (!linkFirst) { setLinkFirst(id); setSelected(id); return; }
    if (id === linkFirst) { setLinkFirst(null); return; }
    setPendingLink({ a: linkFirst, b: id }); setLinkFirst(null);
  };

  useEffect(() => {
    const move = (e) => {
      if (drag.current) {
        const p = toSim(e.clientX, e.clientY);
        const node = nodesRef.current.find((n) => n.id === drag.current.id); if (!node) return;
        drag.current.moved = true; node.fx = p.x - drag.current.ox; node.fy = p.y - drag.current.oy;
      } else if (pan.current) {
        const dx = e.clientX - pan.current.x0, dy = e.clientY - pan.current.y0;
        setView((v) => ({ ...v, x: pan.current.vx + dx * pan.current.scale, y: pan.current.vy + dy * pan.current.scale }));
      }
    };
    const up = () => {
      if (drag.current) {
        const d = drag.current;
        if (!d.moved) { if (linkMode) pickLink(d.id); else { setSelected(d.id); revealFrom(d.id); } }
        drag.current = null; simRef.current.alphaTarget(0);
      }
      pan.current = null;
    };
    window.addEventListener("pointermove", move); window.addEventListener("pointerup", up);
    return () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
  }, [toSim, revealFrom, linkMode, linkFirst]);

  const onBgDown = (e) => { const r = svgRef.current.getBoundingClientRect(); pan.current = { x0: e.clientX, y0: e.clientY, vx: view.x, vy: view.y, scale: W / r.width }; };
  const onWheel = (e) => {
    e.preventDefault();
    const p = toSim(e.clientX, e.clientY);
    let factor = Math.pow(1.0015, -e.deltaY); // proportional to how far you scrolled — smooth on trackpads
    factor = Math.max(0.8, Math.min(1.25, factor)); // cap each step so chunky mouse wheels don't jump
    setView((v) => { const k = Math.max(0.3, Math.min(3.5, v.k * factor)); return { k, x: v.x - p.x * (k - v.k), y: v.y - p.y * (k - v.k) }; });
  };
  const fitView = useCallback(() => {
    const ns = nodesRef.current.filter((n) => n.x != null); if (!ns.length) return;
    const xs = ns.map((n) => n.x), ys = ns.map((n) => n.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
    const bw = (maxX - minX) + 140, bh = (maxY - minY) + 140;
    const k = Math.max(0.3, Math.min(1.6, Math.min(W / bw, H / bh)));
    setView({ k, x: W / 2 - (k * (minX + maxX)) / 2, y: H / 2 - (k * (minY + maxY)) / 2 });
  }, []);

  // editing
  const candKey = (c) => c.a + "|" + c.b;
  const togglePin = (c) => setPinned((p) => { const n = new Set(p); const k = candKey(c); n.has(k) ? n.delete(k) : n.add(k); return n; });
  const addLink = (a, b, rel, note) => {
    const link = rel === "structure" ? { source: a, target: b, type: "structure", user: true, note } : { source: a, target: b, type: "pattern", pattern: rel, user: true, note };
    setGraph((g) => ({ nodes: g.nodes, links: [...g.links, link] }));
    setRevealed((prev) => { const n = new Set(prev); n.add(a); n.add(b); return n; });
  };
  const acceptCandidate = (c) => { addLink(c.a, c.b, c.fams[0] || "structure"); setPinned((p) => { const n = new Set(p); n.delete(candKey(c)); return n; }); setHoverCand(null); };

  const analyze = async (c) => {
    const k = candKey(c); setAnalyzing(k); setAnalysis(null); setAnalysisErr(null);
    const a = NODE_BY_ID[c.a], b = NODE_BY_ID[c.b];
    const prompt = "You are an interdisciplinary scientist judging whether a connection between two concepts is a NEW idea or already known.\n\n" +
      "Concept A: " + a.label + " (" + TOPICS[a.topic].label + "). " + a.note + "\n" +
      "Concept B: " + b.label + " (" + TOPICS[b.topic].label + "). " + b.note + "\n" +
      "Flagged because: " + c.reasons.join("; ") + ".\n\n" +
      "First, use web search to check whether these two have already been connected in existing research or writing. Then propose 2-3 concrete ways they might connect. For each include: hypothesis (one line), mechanism (why it might hold), plausibility (established | plausible | speculative), novelty (known = already documented | emerging = some prior discussion | novel = little or no prior connection found), and test (how to check). Add a one-sentence overall summary of what the search suggests about novelty. Be candid; never label something novel if it is actually well known. Keep it concise.\n\n" +
      "Respond with ONLY JSON as your final output, no markdown fences: {\"summary\":\"...\",\"links\":[{\"hypothesis\":\"...\",\"mechanism\":\"...\",\"plausibility\":\"...\",\"novelty\":\"...\",\"test\":\"...\"}]}";
    try {
      const res = await fetch(ANALYZE_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }], tools: [{ type: "web_search_20250305", name: "web_search" }] }) });
      const data = await res.json();

  const growFrom = async (id) => {

      const st = text.indexOf("{"), en = text.lastIndexOf("}"); if (st >= 0 && en > st) text = text.slice(st, en + 1);

  const toggleGrowItem = (i) => setGrowList((g) => ({ ...g, items: g.items.map((x, j) => (j === i ? { ...x, _add: !x._add } : x)) }));
  const applyGrowth = () => {

    const labelToId = {}; nodes.forEach((n) => (labelToId[n.label.toLowerCase()] = n.id));

            </div>
          </div>
        );
      })()}

      {!intro && (<React.Fragment>

                return (
                  <g key={"hypo" + candKey(c)} style={{ pointerEvents: "none" }}>
                    <path className="pattern-edge" d={"M" + s.x + "," + s.y + " Q" + cx + "," + cy + " " + t.x + "," + t.y} fill="none" stroke={HYPO} strokeWidth={2.2} strokeOpacity={0.9} strokeDasharray="2 8" strokeLinecap="round" />
                    <circle cx={qx} cy={qy} r={9} fill="#1a1330" stroke={HYPO} strokeWidth={1.2} />
                    <text x={qx} y={qy + 4} textAnchor="middle" fontSize={12} fill={HYPO} style={{ fontWeight: 600 }}>?</text>
                  </g>
                );
              });
            })()}
            {nodesRef.current.map((n) => {
              if (n.x == null) return null;
              const color = TOPICS[n.topic].color, op = nodeAlpha(n);
              return (
                <g key={n.id} transform={"translate(" + n.x + "," + n.y + ")"} className="node-hit appear" opacity={op} onPointerDown={(e) => onNodeDown(e, n.id)}>
                  {isFrontier(n.id) && !q && !emph && <circle r={n.r} fill={color} className="frontier" />}
                  {n.id === linkFirst && <circle r={n.r + 7} fill="none" stroke="#8fd6b0" strokeWidth={2} />}
                  {n.id === selected && <circle r={n.r + 6} fill="none" stroke={color} strokeWidth={1.5} strokeOpacity={0.85} />}
                  {matches(n) && <circle r={n.r + 6} fill="none" stroke="#ffffff" strokeWidth={1.5} strokeOpacity={0.8} />}
                  <circle r={n.r} fill={color} filter="url(#glow)" />
                  <circle r={n.r} fill={color} />
                  {showLabel(n) && <text y={n.r + 15} textAnchor="middle" fill="#e8ecf5" fontSize={12.5} style={{ pointerEvents: "none", userSelect: "none" }}>{n.label}</text>}
                </g>
              );
            })}
          </g>
        </svg>
        <div style={{ position: "absolute", left: 10, bottom: 10, background: "rgba(8,12,22,0.82)", border: "1px solid #1d2638", borderRadius: 10, padding: "7px 11px", display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap", maxWidth: "calc(100% - 20px)", pointerEvents: "none" }}>
          <span style={{ color: "#6b7387", fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase" }}>key</span>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "#aeb6c8", fontSize: 11.5 }}>
            <svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" stroke={STRUCT} strokeWidth="1.7" /></svg>is made of
          </span>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "#aeb6c8", fontSize: 11.5 }}>
            <svg width="26" height="11"><path d="M1,8 Q13,1 25,8" fill="none" stroke="#43d0e0" strokeWidth="1.7" strokeDasharray="4 3" strokeLinecap="round" /></svg>same pattern <span style={{ color: "#6b7387" }}>(color = type above)</span>
          </span>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "#aeb6c8", fontSize: 11.5 }}>
            <svg width="30" height="13"><path d="M1,10 Q15,3 29,10" fill="none" stroke={HYPO} strokeWidth="1.8" strokeDasharray="2 4" strokeLinecap="round" /><circle cx="15" cy="5.5" r="4.2" fill="#1a1330" stroke={HYPO} strokeWidth="1" /><text x="15" y="8" textAnchor="middle" fontSize="7" fill={HYPO}>?</text></svg>proposed link
          </span>
        </div>
        </div>

        <div className="row" style={{ gap: "8px 14px", marginTop: 8, fontSize: 12 }}>
          <span style={{ color: "#6b7387" }}>topics:</span>
          {Object.entries(TOPICS).map(([tk, t]) => (
            <button key={tk} onClick={() => setIsoTopic((cur) => (cur === tk ? null : tk))} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "transparent", border: "none", cursor: "pointer", opacity: isoTopic && isoTopic !== tk ? 0.4 : 1, color: "#aeb6c8", fontFamily: "inherit", fontSize: 12 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: t.color, display: "inline-block" }} />{t.label}
            </button>
          ))}
        </div>

        {discover && (
          <div style={{ marginTop: 8, background: "#100a22", border: "1px solid #2a2147", borderRadius: 10, padding: "10px 12px" }}>
            <div style={{ color: HYPO, fontSize: 13, fontWeight: 500 }}>Candidate connections</div>
            <div style={{ color: "#8a93a6", fontSize: 12, marginTop: 2, marginBottom: 8 }}>Proposals, not conclusions — {APP_NAME} can put two ideas in the same room; only a test decides if there's a door. Hover to preview, click to pin, add to commit.</div>
            <div style={{ maxHeight: 240, overflowY: "auto" }}>
              {CANDIDATES.map((c) => {
                const a = NODE_BY_ID[c.a], b = NODE_BY_ID[c.b], isPinned = pinned.has(candKey(c));
                return (
                  <div key={candKey(c)} onMouseEnter={() => setHoverCand(c)} onMouseLeave={() => setHoverCand(null)} onClick={() => togglePin(c)}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 8px", borderRadius: 8, cursor: "pointer", background: isPinned ? "#1c1440" : "transparent", border: "1px solid " + (isPinned ? HYPO : "transparent") }}>
                    <span style={{ color: HYPO, fontSize: 12, width: 14, textAlign: "center" }}>{isPinned ? "\u25C9" : "\u25CB"}</span>
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "#dbe1ee" }}>
                      <span style={{ width: 8, height: 8, borderRadius: 2, background: TOPICS[a.topic].color, display: "inline-block" }} />{a.label}
                      <span style={{ color: "#6b7387" }}>&harr;</span>
                      <span style={{ width: 8, height: 8, borderRadius: 2, background: TOPICS[b.topic].color, display: "inline-block" }} />{b.label}
                    </span>
                    <span style={{ flex: 1 }} />
                    <span style={{ fontSize: 11.5, color: "#8a93a6", maxWidth: 220, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.reasons.join("; ")}</span>
                    <button className="btn" onClick={(e) => { e.stopPropagation(); analyze(c); }} style={{ padding: "2px 8px", color: HYPO, borderColor: "#3a2f5e" }}>{analyzing === candKey(c) ? "…" : "analyze"}</button>
                    <button className="btn" onClick={(e) => { e.stopPropagation(); acceptCandidate(c); }} style={{ color: "#0a0f1d", background: "#8fd6b0", borderColor: "#8fd6b0", padding: "2px 8px" }}>+ add</button>
                  </div>
                );
              })}
              {CANDIDATES.length === 0 && <div style={{ color: "#6b7387", fontSize: 12.5, padding: "6px 8px" }}>No open questions — every implied bridge has been drawn.</div>}
            </div>

            {(analyzing || analysis || analysisErr) && (
              <div style={{ marginTop: 10, borderTop: "1px solid #2a2147", paddingTop: 10 }}>
                {analyzing && NODE_BY_ID[analyzing.split("|")[0]] && (
                  <div style={{ color: "#aeb6c8", fontSize: 12.5 }}>Searching the literature and analyzing the gap between {NODE_BY_ID[analyzing.split("|")[0]].label} and {NODE_BY_ID[analyzing.split("|")[1]].label}…</div>
                )}
                {analysisErr && <div style={{ color: "#e0a06a", fontSize: 12.5 }}>{analysisErr}</div>}
                {analysis && (() => {
                  const [ka, kb] = analysis.key.split("|"); const na = NODE_BY_ID[ka], nb = NODE_BY_ID[kb];
                  if (!na || !nb) return null;
                  const cand = CANDIDATES.find((c) => candKey(c) === analysis.key);
                  return (
                    <div>
                      <div style={{ color: HYPO, fontSize: 12.5, marginBottom: 4 }}>Possible connections: {na.label} &harr; {nb.label}</div>
                      {analysis.summary && <div style={{ color: "#aeb6c8", fontSize: 12, marginBottom: 8, lineHeight: 1.45 }}>{analysis.summary}</div>}
                      {analysis.links.map((h, i) => {
                        const pc = h.plausibility === "established" ? { background: "#13351f", color: "#7ddc9b" } : h.plausibility === "plausible" ? { background: "#3a2a12", color: "#f2c073" } : { background: "#241a40", color: "#c9b8e8" };
                        const nv = (h.novelty || "").toLowerCase();
                        const isNovel = nv.indexOf("nov") === 0, isEmerging = nv.indexOf("emerg") === 0;
                        const nc = isNovel ? { background: "#2a1545", color: "#eccaff", border: "1px solid #6a4bb0" } : isEmerging ? { background: "#33240f", color: "#f2c073", border: "1px solid #5a4012" } : { background: "#16202e", color: "#8aa0b8", border: "1px solid #25313f" };
                        const nlabel = isNovel ? "\u2605 new idea" : isEmerging ? "emerging" : "already known";
                        return (
                          <div key={i} style={{ marginBottom: 8, background: "#0c0820", border: "1px solid " + (isNovel ? "#3a2a5e" : "#241a40"), borderRadius: 8, padding: "9px 11px" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                              <span style={{ fontSize: 13, color: "#e3e7f1", fontWeight: 500 }}>{h.hypothesis}</span>
                              <span style={{ fontSize: 10.5, padding: "1px 8px", borderRadius: 999, ...nc }}>{nlabel}</span>
                              <span style={{ fontSize: 10.5, padding: "1px 8px", borderRadius: 999, ...pc }}>{h.plausibility}</span>
                            </div>
                            {h.mechanism && <div style={{ fontSize: 12, color: "#aeb6c8", marginTop: 4, lineHeight: 1.45 }}>{h.mechanism}</div>}
                            {h.test && <div style={{ fontSize: 11.5, color: "#7f8aa0", marginTop: 4 }}>How to check: {h.test}</div>}
                            <button className="btn" style={{ marginTop: 7, padding: "2px 8px" }} onClick={() => addLink(ka, kb, (cand && cand.fams[0]) || "flow", h.hypothesis)}>+ add this connection</button>
                          </div>
                        );
                      })}
                      <div style={{ color: "#6b7387", fontSize: 11.5, marginTop: 2 }}>Novelty is the model's read of the literature it searched — a lead to verify, not proof of priority.</div>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        {sel && (
          <div style={{ marginTop: 8, background: "#101728", border: "1px solid #1d2638", borderRadius: 10, padding: "8px 12px" }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <span style={{ color: TOPICS[sel.topic].color, fontSize: 13.5, fontWeight: 500 }}>{sel.label}</span>
                <span style={{ color: "#c4ccdb", fontSize: 13.5 }}> — {sel.note}</span>
              </div>
              <button className="btn" onClick={() => growFrom(sel.id)} style={{ color: "#8fd6b0", borderColor: "#2f5e45", whiteSpace: "nowrap" }}>{growing ? "growing…" : "\u2726 grow"}</button>
            </div>
            {Object.keys(selByPattern).map((pk) => (
              <div key={pk} style={{ color: PATTERNS[pk].color, fontSize: 12.5, marginTop: 4 }}>{PATTERNS[pk].note} Shares it with: {selByPattern[pk].map((id) => NODE_BY_ID[id].label).join(", ")}.</div>
            ))}
            {selUserLinks.length > 0 && (
              <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
                <span style={{ color: "#8fd6b0", fontSize: 12 }}>your links:</span>
                {selUserLinks.map((l, i) => {
                  const other = l.source === sel.id ? l.target : l.source;
                  return <span key={i} style={{ fontSize: 11.5, color: "#cdd4e2", border: "1px solid #2a3445", borderRadius: 999, padding: "2px 8px" }}>{NODE_BY_ID[other] ? NODE_BY_ID[other].label : other} <span onClick={() => removeLink(l)} style={{ cursor: "pointer", color: "#e0888a", marginLeft: 4 }}>×</span></span>;
                })}
              </div>
            )}
          </div>
        )}
        {growList && (
          <div style={{ marginTop: 8, background: "#0b1a14", border: "1px solid #234a39", borderRadius: 10, padding: "10px 12px" }}>
            {growList.error ? (
              <div style={{ color: "#e0a06a", fontSize: 12.5 }}>Couldn't reach the expansion model from here. Inside Claude this runs automatically; on your own deploy, point ANALYZE_ENDPOINT at your API proxy.</div>
            ) : (
              <React.Fragment>
                <div style={{ color: "#8fd6b0", fontSize: 13, fontWeight: 500 }}>New concepts around {NODE_BY_ID[growList.seed] && NODE_BY_ID[growList.seed].label}</div>
                <div style={{ color: "#8a93a6", fontSize: 12, marginTop: 2, marginBottom: 8 }}>AI-proposed neighbours. Uncheck any you don't want, then add them to your living map.</div>
                {growList.items.map((it, i) => (
                  <div key={i} onClick={() => toggleGrowItem(i)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 6px", borderRadius: 8, cursor: "pointer", opacity: it._add ? 1 : 0.4 }}>
                    <span style={{ color: "#8fd6b0", width: 14, textAlign: "center" }}>{it._add ? "\u2611" : "\u2610"}</span>
                    <span style={{ width: 9, height: 9, borderRadius: 2, background: (TOPICS[it.topic] || TOPICS[NODE_BY_ID[growList.seed].topic]).color, display: "inline-block" }} />
                    <span style={{ fontSize: 12.5, color: "#dbe1ee", fontWeight: 500 }}>{it.label}</span>
                    <span style={{ fontSize: 11.5, color: "#8a93a6", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.note}</span>
                    <span style={{ fontSize: 10.5, color: "#7f8aa0" }}>{it.relation}</span>
                  </div>
                ))}
                <div className="row" style={{ marginTop: 8 }}>
                  <button className="btn" onClick={applyGrowth} style={{ color: "#0a0f1d", background: "#8fd6b0", borderColor: "#8fd6b0" }}>add {growList.items.filter((x) => x._add).length} to map</button>
                  <button className="btn" onClick={() => setGrowList(null)}>cancel</button>
                </div>
              </React.Fragment>
            )}
          </div>
        )}
      </React.Fragment>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Weave />);
</script>
</body>
</html>
